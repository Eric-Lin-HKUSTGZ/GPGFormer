dataset:
  name: freihand
  img_size: 256
  # Root joint index used for all root-relative ops (loss/eval). Default: 9 (middle MCP, FreiHAND convention).
  root_index: 9
  # Use training set split for validation (9:1)
  use_trainval_split: false
  trainval_ratio: 0.9
  trainval_seed: 42
  align_wilor_aug: true
  # Train uses GT bbox (from keypoints); eval/test uses detector bbox
  bbox_source_eval: detector
  wilor_aug_config:
    SCALE_FACTOR: 0.3
    ROT_FACTOR: 30 # 30
    TRANS_FACTOR: 0.02
    COLOR_SCALE: 0.2 # 0.2
    ROT_AUG_RATE: 0.6 # 0.6
    TRANS_AUG_RATE: 0.5
    DO_FLIP: false
    FLIP_AUG_RATE: 0.0
    EXTREME_CROP_AUG_RATE: 0.0
    EXTREME_CROP_AUG_LEVEL: 1

paths:
  freihand_root: /root/code/vepfs/dataset/FreiHAND_pub_v2
  freihand_eval_root: /root/code/vepfs/dataset/FreiHAND_pub_v2_eval
  wilor_ckpt: /root/code/vepfs/GPGFormer/weights/wilor_final.ckpt
  vitpose_ckpt: /root/code/hand_reconstruction/WiLoR/pretrained_models/vitpose-l.pth
  detector_ckpt: /root/code/vepfs/GPGFormer/weights/detector.pt
  moge2_ckpt: /root/code/vepfs/GPGFormer/weights/model.pt
  mano_dir: /root/code/vepfs/GPGFormer/weights/mano
  mano_mean_params: /root/code/vepfs/GPGFormer/weights/mano/mano_mean_params.npz

model:
  # Backbone selection: wilor | vitpose
  backbone_type: wilor
  image_size: 256
  focal_length: 5000
  use_geo_prior: true
  moge2_num_tokens: 400
  moge2_output: neck
  token_fusion_mode: sum
  sum_fusion_strategy: channel_concat
  # Start from RGB-dominant fusion and let geometry enter gradually.
  sum_geo_gate_init: -1.2
  fusion_proj_zero_init: true
  # Mild geo dropout reduces over-reliance on noisy geometry tokens.
  geo_branch_dropout_prob: 0.05
  cross_attn_num_heads: 8
  cross_attn_dropout: 0.0
  cross_attn_gate_init: 0.0
  side_tuning:
    enabled: false
    side_channels: 256
    dropout: 0.05
    max_res_scale: 0.1
    init_res_scale: 0.001
  geo_tokenizer_use_pooling: true
  mano_decoder: wilor
  freihand_mano_root: /root/code/hand_reconstruction/freihand/data
  mano_head:
    ief_iters: 3
    transformer_input: mean_shape  # mean_shape | zero
    dim: 1024
    depth: 6
    heads: 8
    dim_head: 64
    mlp_dim: 2048
    dropout: 0.0
  feature_refiner:
    method: sjta  # Options: sjta, coear, wilor_msf, kcr, none
    feat_dim: 1280
    sjta_bottleneck_dim: 256
    sjta_num_heads: 4
    sjta_use_2d_prior: true
    sjta_num_steps: 2
    coear_dilation1: 1
    coear_dilation2: 2
    coear_gate_reduction: 8
    coear_init_alpha: 0.1
    wilor_msf_bottleneck_ratio: 4
    wilor_msf_dilation1: 1
    wilor_msf_dilation2: 2
    wilor_msf_dilation3: 3
    wilor_msf_gate_reduction: 8
    wilor_msf_init_alpha: 0.1
    kcr_num_keypoints: 21
    kcr_hidden_dim: 128

loss:
  reduction: mean
  w_2d: 1.0
  # Extra lightweight supervision for KCR heatmap/soft-argmax branch (only used when KCR is enabled)
  w_kcr_2d: 1.0
  # Stay close to the proven loss baseline to protect PA-MPJPE.
  w_3d_joint: 5.0
  w_bone_length: 1.0
  joint_3d_tip_weight: 2.5
  tip_joint_indices: [4, 8, 12, 16, 20]
  bone_pairs:
    - [0, 1]
    - [1, 2]
    - [2, 3]
    - [3, 4]
    - [0, 5]
    - [5, 6]
    - [6, 7]
    - [7, 8]
    - [0, 9]
    - [9, 10]
    - [10, 11]
    - [11, 12]
    - [0, 13]
    - [13, 14]
    - [14, 15]
    - [15, 16]
    - [0, 17]
    - [17, 18]
    - [18, 19]
    - [19, 20]
  # Small mesh loss helps MPVPE without pulling optimization away from joints too early.
  w_3d_vert: 0.08
  # Keep MANO parameter terms active but less dominant than the unstable run.
  w_global_orient: 0.4
  w_hand_pose: 0.4
  w_scale: 0.0
  # Shape must be constrained, but beta loss should remain softer than joint supervision.
  w_shape: 0.06
  mano_param_loss_type: smooth_l1
  mano_param_smooth_l1_beta: 0.05
  # 0.25 clipped every sample in the failed run; 1.0 keeps robustness while allowing learning.
  mano_param_per_sample_clip: 1.0

train:
  use_cuda: true
  epochs: 50
  batch_size: 96
  val_batch_size: 96
  lr: 2e-5
  weight_decay: 1e-4
  lr_multiplier:
    backbone: 0.5
    # Reduce decoder/head aggressiveness; 5.0 was too sharp for MANO branches.
    head: 2.0
    geo_fusion: 0.25
    side_tuning: 0.8
  warmup_epochs: 8
  geo_fusion_start_factor: 0.05
  geo_fusion_ramp_epochs: 20
  side_tuning_start_factor: 0.1
  side_tuning_ramp_epochs: 12
  min_lr: 5e-7
  seed: 42

  # More aggressive RGB token masking to stress-test robustness gains.
  # Apply masking directly on the main forward so the result reflects the
  # pure regularization effect of masking itself.
  rgb_token_mask:
    enabled: true
    apply_to_main_forward: true
    apply_prob: 0.60
    ratio_start: 0.0
    ratio_end: 0.12
    ramp_epochs: 20
    mode: block
    fill: zero

  # Keep consistency disabled here because train.py skips the consistency
  # branch when apply_to_main_forward=true.
  consistency:
    enabled: false
    w_3d: 0.0
    w_mesh: 0.0
    start_factor: 1.0
    ramp_epochs: 0
    max_samples: 0

  grad_clip_norm: 1.0
  use_ema: false
  ema_decay: 0.9998
  eval_train_metrics: false # print train metrics
  num_workers: 32
  best_ckpt_metric: joint_mesh
  out_dir: /root/code/vepfs/GPGFormer/checkpoints/freihand_loss_beta_mesh_best_rgb_mask_aggressive_20260313

metrics:
  # FreiHAND MANO params have noticeable GT inconsistency, so keep a tolerant mesh validity threshold.
  mesh_fallback_kp_consistency_thr_mm: 40.0
